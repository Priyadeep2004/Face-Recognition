<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="FaceID Pro — Forgot Password">
  <title>Forgot Password | FaceID Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="fas fa-eye"></i></div>
      <span class="sidebar-logo-text">FaceID <span class="accent">Pro</span></span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
      <div class="nav-section-label">STUDENT</div>
      <a href="student.html" class="nav-item"><i class="fas fa-camera"></i><span>Student Panel</span></a>
      <div class="nav-section-label">ADMIN ACCESS</div>
      <a href="login.html" class="nav-item"><i class="fas fa-lock"></i><span>Admin Login</span></a>
    </nav>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
    <i class="fas fa-bars"></i>
  </button>

  <main class="main-content" id="mainContent">
    <div class="form-page">
      <div class="form-container" data-aos="fade-up">
        <div class="form-header">
          <div class="form-icon" style="background:rgba(251,191,36,0.12);color:var(--warning);border-color:rgba(251,191,36,0.25);">
            <i class="fas fa-key"></i>
          </div>
          <h2>Forgot Password</h2>
          <p>Enter your username to reset your password</p>
        </div>

        <form method="POST" id="forgotForm">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="form-input-icon-wrapper">
              <i class="fas fa-user form-input-icon"></i>
              <input class="form-input" type="text" id="username" name="username"
                     placeholder="Your username" required>
            </div>
          </div>

          <button type="submit" class="btn btn-full btn-lg"
                  style="background:linear-gradient(135deg,var(--warning),#f59e0b);color:#070b14;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;"
                  id="forgotSubmit">
            <i class="fas fa-paper-plane"></i> Send Reset Link
          </button>
        </form>

        <div class="divider"></div>
        <p class="text-center">
          <a href="login.html" class="link" id="backToLogin">
            <i class="fas fa-arrow-left"></i> Back to Login
          </a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    const BACKEND_URL = 'YOUR_BACKEND_URL';
    document.getElementById('forgotForm').action = BACKEND_URL + '/forgot_password';
    document.getElementById('forgotForm').method = 'POST';

    AOS.init({ duration: 600, once: true, offset: 30, easing: 'ease-out-cubic' });
    document.getElementById('sidebarToggle').addEventListener('click', () =>
      document.getElementById('sidebar').classList.toggle('open'));

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.5+0.3;this.speedX=(Math.random()-.5)*.3;this.speedY=(Math.random()-.5)*.3;this.opacity=Math.random()*.4+.05;}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${this.opacity})`;ctx.fill();}}
    for(let i=0;i<80;i++)particles.push(new Particle());
    (function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(loop);})();
  </script>
</body>
</html>
