{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-container" data-aos="fade-up">
    <div class="form-header">
      <div class="form-icon" style="background:rgba(251,191,36,0.12);color:var(--warning);border-color:rgba(251,191,36,0.25);">
        <i class="fas fa-key"></i>
      </div>
      <h2>Forgot Password</h2>
      <p>Enter your username to reset your password</p>
    </div>

    <form method="POST" action="{{ url_for('forgot_password') }}" id="forgotForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-user form-input-icon"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Your username" required>
        </div>
      </div>

      <button type="submit" class="btn btn-full btn-lg"
              style="background:linear-gradient(135deg,var(--warning),#f59e0b);color:#070b14;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;"
              id="forgotSubmit">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center">
      <a href="{{ url_for('login') }}" class="link" id="backToLogin">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </p>
  </div>
</div>
{% endblock %}
