{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-container" data-aos="fade-up">
    <div class="form-header">
      <div class="form-icon" style="background:var(--success-dim);color:var(--success);border-color:rgba(16,217,126,0.25);">
        <i class="fas fa-shield-halved"></i>
      </div>
      <h2>Reset Password</h2>
      <p>Set a new password for <strong style="color:var(--accent);">@{{ username }}</strong></p>
    </div>

    <form method="POST" action="{{ url_for('reset_password_username', username=username) }}" id="resetForm">
      <div class="form-group">
        <label class="form-label" for="new_password">New Password</label>
        <div class="form-input-icon-wrapper" style="position:relative;">
          <i class="fas fa-lock form-input-icon"></i>
          <input class="form-input" type="password" id="new_password" name="new_password"
                 placeholder="Enter new password" required minlength="6"
                 style="padding-left:42px;padding-right:42px;">
          <button type="button" id="togglePass"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        <!-- Password strength -->
        <div style="margin-top:8px;">
          <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
            <div id="strengthFill" style="height:100%;width:0%;border-radius:2px;transition:all .3s;"></div>
          </div>
          <span id="strengthText" style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;display:block;"></span>
        </div>
      </div>

      <button type="submit" class="btn btn-full btn-lg"
              style="background:linear-gradient(135deg,var(--success),#059669);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;"
              id="resetSubmit">
        <i class="fas fa-check-circle"></i> Reset Password
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center">
      <a href="{{ url_for('login') }}" class="link" id="backToLoginReset">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn = document.getElementById('togglePass');
  const passInput = document.getElementById('new_password');
  const toggleIcon= document.getElementById('toggleIcon');

  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const show = passInput.type === 'password';
      passInput.type = show ? 'text' : 'password';
      toggleIcon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    });
  }

  passInput.addEventListener('input', () => {
    const val = passInput.value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { label: '', color: '' },
      { label: 'Weak', color: 'var(--error)' },
      { label: 'Fair', color: 'var(--warning)' },
      { label: 'Good', color: '#60a5fa' },
      { label: 'Strong', color: 'var(--success)' },
      { label: 'Very Strong', color: 'var(--success)' },
    ];
    const level = val.length === 0 ? 0 : Math.max(1, score);
    fill.style.width  = `${(level/5)*100}%`;
    fill.style.background = levels[level].color;
    text.textContent = levels[level].label;
    text.style.color = levels[level].color;
  });
</script>
{% endblock %}
