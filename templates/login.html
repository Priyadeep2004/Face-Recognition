{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-container" data-aos="fade-up">
    <div class="form-header">
      <div class="form-icon">
        <i class="fas fa-right-to-bracket"></i>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to your FaceID Pro account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-user form-input-icon"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-icon-wrapper" style="position:relative;">
          <i class="fas fa-lock form-input-icon"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password"
                 style="padding-left:42px; padding-right:42px;">
          <button type="button" id="togglePassword"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;transition:color .2s;">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:-10px;margin-bottom:20px;">
        <a href="{{ url_for('forgot_password') }}" class="link" style="font-size:0.8rem;" id="forgotPasswordLink">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginSubmit">
        <i class="fas fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="divider"></div>

    <p class="text-center" style="font-size:0.85rem;color:var(--text-secondary);">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="link" id="goToRegister">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn = document.getElementById('togglePassword');
  const passInput = document.getElementById('password');
  const toggleIcon = document.getElementById('toggleIcon');

  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      toggleIcon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
      toggleBtn.style.color = isPass ? 'var(--accent)' : 'var(--text-muted)';
    });
  }
</script>
{% endblock %}
