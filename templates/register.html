{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-container" data-aos="fade-up" style="max-width:560px;">
    <div class="form-header">
      <div class="form-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <h2>Create Account</h2>
      <p>Register to start using FaceID Pro</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="registerForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-at form-input-icon"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Choose a unique username" required autocomplete="username" minlength="3">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="display_name">Display Name</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-id-card form-input-icon"></i>
          <input class="form-input" type="text" id="display_name" name="display_name"
                 placeholder="Your full name" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-icon-wrapper" style="position:relative;">
          <i class="fas fa-lock form-input-icon"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Create a strong password" required minlength="6"
                 style="padding-left:42px; padding-right:42px;">
          <button type="button" id="togglePassword"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;transition:color .2s;">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        <!-- Password strength indicator -->
        <div style="margin-top:8px;" id="strengthBar">
          <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
            <div id="strengthFill" style="height:100%;width:0%;border-radius:2px;transition:all .3s;"></div>
          </div>
          <span id="strengthText" style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;display:block;"></span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;" id="registerSubmit">
        <i class="fas fa-rocket"></i> Create Account
      </button>
    </form>

    <div class="divider"></div>

    <p class="text-center" style="font-size:0.85rem;color:var(--text-secondary);">
      Already have an account?
      <a href="{{ url_for('login') }}" class="link" id="goToLogin">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Show/hide password
  const toggleBtn = document.getElementById('togglePassword');
  const passInput = document.getElementById('password');
  const toggleIcon = document.getElementById('toggleIcon');

  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      toggleIcon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
      toggleBtn.style.color = isPass ? 'var(--accent)' : 'var(--text-muted)';
    });
  }

  // Password strength
  passInput.addEventListener('input', () => {
    const val = passInput.value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { label: '', color: '' },
      { label: 'Weak', color: 'var(--error)' },
      { label: 'Fair', color: 'var(--warning)' },
      { label: 'Good', color: '#60a5fa' },
      { label: 'Strong', color: 'var(--success)' },
      { label: 'Very Strong', color: 'var(--success)' },
    ];

    const level = val.length === 0 ? 0 : Math.max(1, score);
    fill.style.width  = `${(level / 5) * 100}%`;
    fill.style.background = levels[level].color;
    text.textContent = levels[level].label;
    text.style.color = levels[level].color;
  });
</script>
{% endblock %}
