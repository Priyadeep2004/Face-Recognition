{% extends "base.html" %}

{% block title %}Register User{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-container" data-aos="fade-up" style="max-width:560px;">
    <div class="form-header">
      <div class="form-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <h2>Register New User</h2>
      <p>Create a student or administrator account</p>
    </div>

    <form method="POST" action="{{ url_for('admin_register') }}" id="adminRegisterForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-at form-input-icon"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Unique username" required minlength="3">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="display_name">Display Name</label>
        <div class="form-input-icon-wrapper">
          <i class="fas fa-id-card form-input-icon"></i>
          <input class="form-input" type="text" id="display_name" name="display_name"
                 placeholder="Full name" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-input-icon-wrapper" style="position:relative;">
          <i class="fas fa-lock form-input-icon"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Set a password" required minlength="6"
                 style="padding-left:42px;padding-right:42px;">
          <button type="button" id="togglePass"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="role">Role</label>
        <div style="position:relative;">
          <select class="form-select" id="role" name="role" required>
            <option value="student">Student</option>
            <option value="admin">Administrator</option>
          </select>
          <i class="fas fa-chevron-down" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none;"></i>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;" id="adminRegSubmit">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center">
      <a href="{{ url_for('admin_dashboard') }}" class="link" id="backToAdmin">
        <i class="fas fa-arrow-left"></i> Back to Admin Dashboard
      </a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn = document.getElementById('togglePass');
  const passInput = document.getElementById('password');
  const toggleIcon= document.getElementById('toggleIcon');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const show = passInput.type === 'password';
      passInput.type = show ? 'text' : 'password';
      toggleIcon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
      toggleBtn.style.color = show ? 'var(--accent)' : 'var(--text-muted)';
    });
  }
</script>
{% endblock %}
