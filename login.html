<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="FaceID Pro — Admin Login">
  <title>Login | FaceID Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="fas fa-eye"></i></div>
      <span class="sidebar-logo-text">FaceID <span class="accent">Pro</span></span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
      <div class="nav-section-label">STUDENT</div>
      <a href="student.html" class="nav-item"><i class="fas fa-camera"></i><span>Student Panel</span></a>
      <div class="nav-section-label">ADMIN ACCESS</div>
      <a href="login.html" class="nav-item active"><i class="fas fa-lock"></i><span>Admin Login</span></a>
    </nav>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
    <i class="fas fa-bars"></i>
  </button>

  <main class="main-content" id="mainContent">
    <div class="form-page">
      <div class="form-container" data-aos="fade-up">
        <div class="form-header">
          <div class="form-icon"><i class="fas fa-right-to-bracket"></i></div>
          <h2>Welcome Back</h2>
          <p>Sign in to your FaceID Pro account</p>
        </div>

        <!-- Form POSTs directly to the Flask backend -->
        <form method="POST" action="YOUR_BACKEND_URL/login" id="loginForm">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="form-input-icon-wrapper">
              <i class="fas fa-user form-input-icon"></i>
              <input class="form-input" type="text" id="username" name="username"
                     placeholder="Enter your username" required autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="form-input-icon-wrapper" style="position:relative;">
              <i class="fas fa-lock form-input-icon"></i>
              <input class="form-input" type="password" id="password" name="password"
                     placeholder="Enter your password" required autocomplete="current-password"
                     style="padding-left:42px; padding-right:42px;">
              <button type="button" id="togglePassword"
                      style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;transition:color .2s;">
                <i class="fas fa-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:-10px;margin-bottom:20px;">
            <a href="forgot-password.html" class="link" style="font-size:0.8rem;" id="forgotPasswordLink">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginSubmit">
            <i class="fas fa-right-to-bracket"></i> Sign In
          </button>
        </form>

        <div class="divider"></div>
        <p class="text-center" style="font-size:0.85rem;color:var(--text-secondary);">
          Need help? <a href="index.html" class="link" id="goHome">Go back to home</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const BACKEND_URL = 'YOUR_BACKEND_URL';
    // Update login form action to use real backend URL
    document.getElementById('loginForm').action = BACKEND_URL + '/login';
    // ─────────────────────────────────────────────────────────────────────────

    AOS.init({ duration: 600, once: true, offset: 30, easing: 'ease-out-cubic' });
    document.getElementById('sidebarToggle').addEventListener('click', () =>
      document.getElementById('sidebar').classList.toggle('open'));

    // Particle canvas
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    class Particle {
      constructor(){this.reset();}
      reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.5+0.3;this.speedX=(Math.random()-.5)*.3;this.speedY=(Math.random()-.5)*.3;this.opacity=Math.random()*.4+.05;}
      update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}
      draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${this.opacity})`;ctx.fill();}
    }
    for(let i=0;i<80;i++) particles.push(new Particle());
    (function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(loop);})();

    const toggleBtn = document.getElementById('togglePassword');
    const passInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const isPass = passInput.type === 'password';
        passInput.type = isPass ? 'text' : 'password';
        toggleIcon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
        toggleBtn.style.color = isPass ? 'var(--accent)' : 'var(--text-muted)';
      });
    }
  </script>
</body>
</html>
